<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About — Business Name</title>
    <meta name="description" content="About Business Name." />
    <link rel="stylesheet" href="assets/styles/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="index.html">
          <span class="brand__mark"></span>
          <span class="brand__text">Business Name</span>
        </a>

        <nav class="nav" aria-label="Primary navigation">
          <a class="nav__link" href="index.html">Home</a>
          <a class="nav__link" href="services.html">Services</a>
          <a class="nav__link" href="gallery.html">Work</a>
          <a class="nav__link nav__link--active" href="about.html">About</a>
          <a class="btn btn--primary btn--sm" href="contact.html">Request Quote</a>
        </nav>

        <button class="nav-toggle btn btn--ghost btn--sm" type="button" aria-label="Open menu">
          Menu
        </button>
      </div>
    </header>

    <main class="section section--soft">
      <div class="container split">
        <div class="split__media">
          <img src="assets/images/story.jpg" alt="Business story image" />
        </div>

        <div>
          <p class="eyebrow">About</p>
          <h1 class="h1">Built on quality and trust</h1>
          <p class="lead max-w-prose">
            Write 4–6 sentences: who you are, how you work, what you value, and who you help.
          </p>

          <div class="split__actions">
            <a class="btn btn--primary" href="contact.html">Request Quote</a>
            <a class="btn btn--outline" href="gallery.html">View Work</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <div>
          <p class="footer-title">Business Name</p>
          <p class="muted text-sm">© <span id="year"></span></p>
        </div>
        <div class="footer-actions">
          <a class="btn btn--primary btn--sm" href="contact.html">Request Quote</a>
        </div>
      </div>
    </footer>

    <script src="assets/scripts/script.js"></script>
  </body>
</html>
